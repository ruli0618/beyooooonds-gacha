<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BEYOOOOONDS ビヨスコープガチャ</title>
<style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 30px; background-color: #000; color: #fff; }
    h1 { font-size: 22px; }
    .rates { margin-bottom: 20px; font-size: 13px; color:#aaa; }
    .video-frame {
        width: 100%; max-width: 420px; aspect-ratio: 16/9;
        background: #000; position: relative; overflow: visible;
        margin: 0 auto 240px; display: block;
    }
    .video-frame video { width: 100%; height: 100%; object-fit: cover; z-index: 0; position: relative; }
    .overlay {
        position: absolute; top:50%; left:50%; transform:translate(-50%,-50%);
        width:92%; max-width: 380px;
        display:flex; flex-direction:column; align-items:center; gap:6px;
        white-space:pre-line; pointer-events:none; opacity:0; transition:opacity 1s; z-index:2;
    }
    .overlay img { max-width: 130px; max-height: 130px; object-fit:contain; filter: drop-shadow(2px 2px 6px #000); }
    .overlay-text {
        font-size:12px; font-weight:bold; color:#fff; text-shadow:2px 2px 4px #000; text-align:center;
        width:100%; box-sizing:border-box;
    }
    .counter-overlay {
        position:absolute; bottom:-30px; left:50%; transform:translateX(-50%);
        background:rgba(0,0,0,0.6); color:#fff; padding:6px 12px; border-radius:8px; font-size:16px; z-index:2;
    }
    .video-controls {
        position:absolute; bottom:-228px; left:50%; transform:translateX(-50%);
        display:flex; flex-direction:column; align-items:center; gap:8px; z-index:2;
    }
    .video-controls button {
        margin:0; padding:8px 16px; font-size:14px; cursor:pointer;
    }
    #history {
        display:none; margin:20px auto; max-width:500px;
        background:rgba(255,255,255,0.1); padding:10px; border-radius:10px; text-align:left;
        max-height: 300px; overflow-y:auto;
    }
    #history div { padding: 2px 0; }
    #history .hist-row { display:flex; align-items:center; gap:10px; padding:4px 0; }
    #history .hist-row img { width:44px; height:44px; object-fit:contain; flex-shrink:0; background:rgba(255,255,255,0.06); border-radius:4px; }
    #history .white-text { color:white; }
    #history .gold-text  { color:gold; }
    #history .rainbow-text {
        background: linear-gradient(to right, red, orange, yellow, green, cyan, blue, violet);
        -webkit-background-clip: text; color:transparent;
        animation: rainbow 3s infinite;
    }
    @keyframes rainbow { 0%{filter:hue-rotate(0deg);} 100%{filter:hue-rotate(360deg);} }
    #collection {
        display:none; margin:20px auto; max-width:600px;
        background:rgba(255,255,255,0.1); padding:14px; border-radius:10px; text-align:left;
        max-height: 480px; overflow-y:auto;
    }
    #collection h3 { margin:14px 0 8px; font-size:15px; }
    #collection h3:first-child { margin-top:0; }
    #collection .white-text { color:white; }
    #collection .gold-text  { color:gold; }
    #collection .rainbow-text {
        background: linear-gradient(to right, red, orange, yellow, green, cyan, blue, violet);
        -webkit-background-clip: text; color:transparent;
        animation: rainbow 3s infinite;
    }
    .coll-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(72px, 1fr)); gap:10px; }
    .coll-card { text-align:center; }
    .coll-card img, .coll-card .locked {
        width:100%; aspect-ratio:1/1; object-fit:contain; border-radius:6px;
        background:rgba(255,255,255,0.06); box-sizing:border-box;
    }
    .coll-card .locked { display:flex; align-items:center; justify-content:center; font-size:22px; color:#555; }
    .coll-card .name { font-size:9px; margin-top:3px; line-height:1.25; word-break:break-all; color:#eee; }
    .coll-card .name.locked-name { color:#555; }
</style>
</head>
<body>

<h1>✨BEYOOOOONDS ビヨスコープガチャ✨</h1>
<div class="rates">出現確率　SR:5%　R:30%　N:65%（動画をタップして抽選）</div>

<div class="video-frame">
  <video id="gachaVideo" src="scene_1.mp4" autoplay loop muted playsinline></video>
  <div id="overlay" class="overlay">
    <img id="overlayImg" alt="">
    <div id="overlayText" class="overlay-text"></div>
  </div>
  <div id="counter" class="counter-overlay">SR:0個 / R:0個 / N:0個</div>
  <div class="video-controls">
    <button id="showHistoryButton">獲得アイテム一覧</button>
    <button id="showCollectionButton">コレクション</button>
    <button id="toggleImagesButton">画像表示:ON</button>
    <button id="resetButton">リセット</button>
  </div>
</div>

<div id="history"></div>
<div id="collection"></div>

<script>
  const rarities = [
    { type:"N",  rate:65 },
    { type:"R",  rate:30 },
    { type:"SR", rate:5  }
  ];

  const items = {
    N: [
      { member:"前田こころ", name:"コレクションステッカー2枚セット", file:"[N]コレクションステッカー2枚セット前田こころ.png" },
      { member:"小林萌花",   name:"コレクションステッカー2枚セット", file:"[N]コレクションステッカー2枚セット小林萌花.png" },
      { member:"岡村美波",   name:"コレクションステッカー2枚セット", file:"[N]コレクションステッカー2枚セット岡村美波.png" },
      { member:"平井美葉",   name:"コレクションステッカー2枚セット", file:"[N]コレクションステッカー2枚セット平井美葉.png" },
      { member:"江口紗耶",   name:"コレクションステッカー2枚セット", file:"[N]コレクションステッカー2枚セット江口紗耶.png" },
      { member:"清野桃々姫", name:"コレクションステッカー2枚セット", file:"[N]コレクションステッカー2枚セット清野桃々姫.png" },
      { member:"西田汐里",   name:"コレクションステッカー2枚セット", file:"[N]コレクションステッカー2枚セット西田汐里.png" },
      { member:"里吉うたの", name:"コレクションステッカー2枚セット", file:"[N]コレクションステッカー2枚セット里吉うたの.png" },
      { member:"高瀬くるみ", name:"コレクションステッカー2枚セット", file:"[N]コレクションステッカー2枚セット高瀬くるみ.png" },
      { member:"高瀬くるみ", name:"コレクションステッカー2枚セット(スペシャルVer)", file:"[N]コレクションステッカー2枚セット高瀬くるみスペシャルVer.png" }
    ],
    R: [
      { member:null,         name:"ソロアクリルキーホルダー",   file:"[R]ソロアクリルキーホルダー.png" },
      { member:"前田こころ", name:"ソロアクリルキーホルダーA", file:"[R]ソロアクリルキーホルダー前田こころA.png" },
      { member:"前田こころ", name:"ソロアクリルキーホルダーB", file:"[R]ソロアクリルキーホルダー前田こころB.png" },
      { member:"小林萌花",   name:"ソロアクリルキーホルダーA", file:"[R]ソロアクリルキーホルダー小林萌花A.png" },
      { member:"小林萌花",   name:"ソロアクリルキーホルダーB", file:"[R]ソロアクリルキーホルダー小林萌花B.png" },
      { member:"岡村美波",   name:"ソロアクリルキーホルダーA", file:"[R]ソロアクリルキーホルダー岡村美波A.png" },
      { member:"岡村美波",   name:"ソロアクリルキーホルダーB", file:"[R]ソロアクリルキーホルダー岡村美波B.png" },
      { member:"平井美葉",   name:"ソロアクリルキーホルダーA", file:"[R]ソロアクリルキーホルダー平井美葉A.png" },
      { member:"平井美葉",   name:"ソロアクリルキーホルダーB", file:"[R]ソロアクリルキーホルダー平井美葉B.png" },
      { member:"江口紗耶",   name:"ソロアクリルキーホルダーA", file:"[R]ソロアクリルキーホルダー江口紗耶A.png" },
      { member:"江口紗耶",   name:"ソロアクリルキーホルダーB", file:"[R]ソロアクリルキーホルダー江口紗耶B.png" },
      { member:"清野桃々姫", name:"ソロアクリルキーホルダーA", file:"[R]ソロアクリルキーホルダー清野桃々姫A.png" },
      { member:"清野桃々姫", name:"ソロアクリルキーホルダーB", file:"[R]ソロアクリルキーホルダー清野桃々姫B.png" },
      { member:"西田汐里",   name:"ソロアクリルキーホルダーA", file:"[R]ソロアクリルキーホルダー西田汐里A.png" },
      { member:"西田汐里",   name:"ソロアクリルキーホルダーB", file:"[R]ソロアクリルキーホルダー西田汐里B.png" },
      { member:"里吉うたの", name:"ソロアクリルキーホルダーA", file:"[R]ソロアクリルキーホルダー里吉うたのA.png" },
      { member:"里吉うたの", name:"ソロアクリルキーホルダーB", file:"[R]ソロアクリルキーホルダー里吉うたのB.png" },
      { member:"高瀬くるみ", name:"ソロアクリルキーホルダーA", file:"[R]ソロアクリルキーホルダー高瀬くるみA.png" },
      { member:"高瀬くるみ", name:"ソロアクリルキーホルダーB", file:"[R]ソロアクリルキーホルダー高瀬くるみB.png" }
    ],
    SR: [
      { member:"前田こころ", name:"BIGアクリルスタンドA", file:"[SR]BIGアクリルスタンド前田こころA.png" },
      { member:"前田こころ", name:"BIGアクリルスタンドB", file:"[SR]BIGアクリルスタンド前田こころB.png" },
      { member:"小林萌花",   name:"BIGアクリルスタンドA", file:"[SR]BIGアクリルスタンド小林萌花A.png" },
      { member:"小林萌花",   name:"BIGアクリルスタンドB", file:"[SR]BIGアクリルスタンド小林萌花B.png" },
      { member:"岡村美波",   name:"BIGアクリルスタンドA", file:"[SR]BIGアクリルスタンド岡村美波A.png" },
      { member:"岡村美波",   name:"BIGアクリルスタンドB", file:"[SR]BIGアクリルスタンド岡村美波B.png" },
      { member:"平井美葉",   name:"BIGアクリルスタンドA", file:"[SR]BIGアクリルスタンド平井美葉A.png" },
      { member:"平井美葉",   name:"BIGアクリルスタンドB", file:"[SR]BIGアクリルスタンド平井美葉B.png" },
      { member:"江口紗耶",   name:"BIGアクリルスタンドA", file:"[SR]BIGアクリルスタンド江口紗耶A.png" },
      { member:"江口紗耶",   name:"BIGアクリルスタンドB", file:"[SR]BIGアクリルスタンド江口紗耶B.png" },
      { member:"清野桃々姫", name:"BIGアクリルスタンドA", file:"[SR]BIGアクリルスタンド清野桃々姫A.png" },
      { member:"清野桃々姫", name:"BIGアクリルスタンドB", file:"[SR]BIGアクリルスタンド清野桃々姫B.png" },
      { member:"西田汐里",   name:"BIGアクリルスタンドA", file:"[SR]BIGアクリルスタンド西田汐里A.png" },
      { member:"西田汐里",   name:"BIGアクリルスタンドB", file:"[SR]BIGアクリルスタンド西田汐里B.png" },
      { member:"里吉うたの", name:"BIGアクリルスタンドA", file:"[SR]BIGアクリルスタンド里吉うたのA.png" },
      { member:"里吉うたの", name:"BIGアクリルスタンドB", file:"[SR]BIGアクリルスタンド里吉うたのB.png" },
      { member:"高瀬くるみ", name:"BIGアクリルスタンドA", file:"[SR]BIGアクリルスタンド高瀬くるみA.png" },
      { member:"高瀬くるみ", name:"BIGアクリルスタンドB", file:"[SR]BIGアクリルスタンド高瀬くるみB.png" },
      { member:"高瀬くるみ", name:"BIGアクリルスタンド(スペシャルVer)", file:"[SR]BIGアクリルスタンド高瀬くるみスペシャルVer.png" },
      { member:null,         name:"メモリアルパネル", file:"[SR]メモリアルパネル.png" }
    ]
  };

  function encodePath(file){ return encodeURIComponent(file).replace(/%2F/g, "/"); }

  // 全アイテム画像を先読みしてキャッシュしておく（抽選時の表示遅延を防ぐ）
  const preloadedImages = [];
  Object.values(items).flat().forEach(item => {
    const img = new Image();
    img.src = encodePath(item.file);
    preloadedImages.push(img);
  });

  const STORAGE_KEY = "beyooooonds-gacha-state";

  function loadState(){
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (saved && saved.counts && Array.isArray(saved.history)){
        return { counts: saved.counts, history: saved.history, owned: Array.isArray(saved.owned) ? saved.owned : [] };
      }
    } catch (e) {}
    return { counts: { SR:0, R:0, N:0 }, history: [], owned: [] };
  }

  function saveState(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ counts, history, owned: [...owned] }));
  }

  const saved = loadState();
  let counts = saved.counts;
  let history = saved.history;
  let owned = new Set(saved.owned);
  let drawing = false;

  const SHOW_IMAGES_KEY = "beyooooonds-gacha-show-images";
  let showImages = localStorage.getItem(SHOW_IMAGES_KEY) !== "false";

  const videoEl    = document.getElementById("gachaVideo");
  const overlayEl  = document.getElementById("overlay");
  const overlayImg = document.getElementById("overlayImg");
  const overlayTxt = document.getElementById("overlayText");
  const counterEl  = document.getElementById("counter");
  const histEl     = document.getElementById("history");
  const collEl     = document.getElementById("collection");
  const toggleImagesButton = document.getElementById("toggleImagesButton");

  function renderHistory(){
    histEl.innerHTML = history.map(h => {
      const cls = h.rarity === "SR" ? "rainbow-text" : h.rarity === "R" ? "gold-text" : "white-text";
      const text = h.label.replace("\n", " ");
      if (showImages && h.file){
        return `<div class="hist-row"><img src="${encodePath(h.file)}" alt=""><span class="${cls}">${text}</span></div>`;
      }
      return `<div class="${cls}">${text}</div>`;
    }).join("");
  }

  function renderCollection(){
    collEl.innerHTML = ["SR", "R", "N"].map(rarity => {
      const pool = items[rarity];
      const ownedCount = pool.filter(it => owned.has(it.file)).length;
      const cls = rarity === "SR" ? "rainbow-text" : rarity === "R" ? "gold-text" : "white-text";
      const cards = pool.map(it => {
        const label = it.member ? `${it.member} ${it.name}` : it.name;
        if (owned.has(it.file)){
          return `<div class="coll-card"><img src="${encodePath(it.file)}" alt=""><div class="name">${label}</div></div>`;
        }
        return `<div class="coll-card"><div class="locked">？</div><div class="name locked-name">？？？</div></div>`;
      }).join("");
      return `<h3><span class="${cls}">${rarity} ${ownedCount}/${pool.length}</span></h3><div class="coll-grid">${cards}</div>`;
    }).join("");
  }

  document.getElementById("showCollectionButton").addEventListener("click", () => {
    collEl.style.display = collEl.style.display === "block" ? "none" : "block";
    if (collEl.style.display === "block") renderCollection();
  });

  toggleImagesButton.addEventListener("click", () => {
    showImages = !showImages;
    localStorage.setItem(SHOW_IMAGES_KEY, showImages);
    toggleImagesButton.innerText = `画像表示:${showImages ? "ON" : "OFF"}`;
    if (histEl.style.display === "block") renderHistory();
  });
  toggleImagesButton.innerText = `画像表示:${showImages ? "ON" : "OFF"}`;

  function updateCounter(){ counterEl.innerText = `SR:${counts.SR}個 / R:${counts.R}個 / N:${counts.N}個`; }

  function getRandomRarity(){
    let r = Math.random()*100, sum = 0;
    for (const x of rarities){ sum += x.rate; if (r <= sum) return x.type; }
    return rarities[rarities.length-1].type;
  }

  function drawGacha(){
    if (drawing) return;
    drawing = true;

    const rarity = getRandomRarity();
    const pool = items[rarity];
    const item = pool[Math.floor(Math.random()*pool.length)];
    const label = item.member ? `${item.member}\n${rarity}-${item.name}` : `${rarity}-${item.name}`;

    videoEl.src = "scene_2.mp4";
    videoEl.loop = false;
    overlayEl.style.opacity = 0;
    overlayImg.src = "";
    overlayTxt.innerHTML = "";

    videoEl.onended = () => {
      videoEl.src = rarity === "SR" ? "scene_3_rarity_A.mp4" : rarity === "R" ? "scene_3_rarity_B.mp4" : "scene_3_rarity_C.mp4";
      videoEl.loop = true;
      videoEl.play();
      setTimeout(() => {
        overlayTxt.innerText = label;

        const reveal = () => {
          overlayEl.style.opacity = 1;
          counts[rarity]++;
          history.push({ label, rarity, file: item.file });
          owned.add(item.file);
          updateCounter();
          saveState();
          drawing = false;
        };

        const src = encodePath(item.file);
        if (overlayImg.src.endsWith(src) && overlayImg.complete) {
          reveal();
        } else {
          overlayImg.onload = reveal;
          overlayImg.src = src;
        }
      }, 200);
    };
    videoEl.play();
  }

  videoEl.addEventListener("click", drawGacha);

  document.getElementById("showHistoryButton").addEventListener("click", () => {
    histEl.style.display = histEl.style.display === "block" ? "none" : "block";
    if (histEl.style.display === "block") renderHistory();
  });

  document.getElementById("resetButton").addEventListener("click", () => {
    counts = { SR:0, R:0, N:0 };
    history = [];
    owned = new Set();
    updateCounter();
    saveState();
    histEl.style.display = "none";
    histEl.innerHTML = "";
    collEl.style.display = "none";
    collEl.innerHTML = "";
    overlayEl.style.opacity = 0;
    overlayImg.src = "";
    overlayTxt.innerHTML = "";
    videoEl.src = "scene_1.mp4";
    videoEl.loop = true;
    videoEl.play();
  });

  updateCounter();
</script>

</body>
</html>
